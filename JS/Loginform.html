<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    

    <div>
        <input type="email" name="" id="email" placeholder="Username">
        <input type="password"  id="password" placeholder="password">

        <button onclick="loginValidation()">submit</button>

        <p id="res"></p>
    </div>


    <script>

function loginValidation(){


        const email=document.getElementById("email").value
    const password=document.getElementById("password").value
    const res=document.getElementById("res")


    if(email===""){
    res.textContent="Required Email"
res.style.color="red"

}

else if(password.length<6){
        res.textContent="password must contain 6 characters"
        res.style.color="red"


}

else{
    res.textContent="Login Successfull"
            res.style.color="green"


}
}

    </script>
</body>
</html>
